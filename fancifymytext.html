<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fancify My Text</title>
  <script src="fancifymytext.js"></script>
</head>
<body>
  <h1>Fancify my Text</h1>
  <fieldset>
    <legend>Text</legend>
    <textarea id="userText" rows="4" cols="30"></textarea>
  </fieldset>
  <fieldset>
    <legend>Fancify</legend>
    <button onclick="makeBigger()">Bigger!</button>
    <br><br>
    <input type="radio" id="fancy" name="style" onchange="applyStyle()">
    <label for="fancy">FancyShmancy</label>
    <input type="radio" id="boring" name="style" onchange="applyStyle()" checked>
    <label for="boring">BoringBetty</label>
    <br><br>
    <button onclick="moo()">Moo</button>
  </fieldset>
</body>
</html>
